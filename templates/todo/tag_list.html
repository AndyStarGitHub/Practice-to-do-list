{% extends "base.html" %}

{% block content %}
  <h1>
    Tags
    <a style="float: right" href="{% url 'todo:tag-add' %}" class="btn btn-primary link-to-page">
      Add
    </a>
  </h1>
  <form method="get" action="" class="form-inline">
    <input class="btn btn-secondary" type="submit" value="🔍" >
  </form>
  {% if tag_list %}
    <table class="table">
      <tr>
        <th>Name</th>
        <th>Update</th>
        <th>Delete</th>
      </tr>

      {% for tag in tag_list %}
        <tr>
          <td>
              {{ tag.name }}
          </td>
          <td>
              <a class="btn btn-secondary"
                href="{% url 'todo:tag-update' pk=tag.id %}">
                Update
              </a>
            </td>
            <td>
              <a class="btn btn-secondary"
                href="{% url 'todo:tag-delete' pk=tag.id %}">
                Delete
              </a>
            </td>
        </tr>
      {% endfor %}
    </table>
  {% else %}
    <p>There are no tags yet</p>
  {% endif %}
{% endblock %}
